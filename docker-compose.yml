services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    ## container_name: oracle-db
    container_name: nirmal
    environment:
      - ORACLE_PASSWORD=admin
      # ORACLE_PWD=oracle
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data:

